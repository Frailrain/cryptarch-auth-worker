name = "cryptarch-auth"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Public, non-secret configuration. Real values must be set before deploy.
# Secrets (BUNGIE_CLIENT_SECRET_*, BUNGIE_API_KEY_*) are NOT in this file —
# set them with `wrangler secret put <NAME>`.
[vars]
PROD_CLIENT_ID = ""
DEV_WIN_CLIENT_ID = ""
DEV_LINUX_CLIENT_ID = ""
# Comma-separated list of allowed Origin header values per client.
# Example: "chrome-extension://nmalcfpnieandofopopffppijcadibkg"
ALLOWED_ORIGINS_PROD = ""
ALLOWED_ORIGINS_DEV_WIN = ""
ALLOWED_ORIGINS_DEV_LINUX = ""

# Observability — uncomment after `wrangler login` to ship logs to Tail.
# [observability]
# enabled = true
